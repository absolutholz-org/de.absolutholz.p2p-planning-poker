name: Deploy App to Webgo

# This workflow runs on any push to the 'main'
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # We skip if the commit is purely a release commit to prevent loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # Step 1: Check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # REQUIRED: Fetch all history for semantic-release to calculate version

      # Step 2: Set up PNPM, the package manager for this project
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Use the latest major version of pnpm

      # Step 3: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use the latest LTS Node.js version
          cache: 'pnpm' # Enable caching for pnpm to speed up builds

      # Step 4: Install project dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Build the static site. The output will be in the 'out' directory.
      - name: Build the app
        # The build will now pick up the NEW version from package.json
        env:
          VITE_METERED_PROJECT_URL: ${{ secrets.VITE_METERED_PROJECT_URL }}
          VITE_METERED_TURN_URL: ${{ secrets.VITE_METERED_TURN_URL }}
          VITE_METERED_TURN_URL_TLS: ${{ secrets.VITE_METERED_TURN_URL_TLS }}
          VITE_METERED_USERNAME: ${{ secrets.VITE_METERED_USERNAME }}
          VITE_METERED_CREDENTIAL: ${{ secrets.VITE_METERED_CREDENTIAL }}
        run: pnpm run build

      # Step 6: Deploy the built site to your server via SSH/rsync
      - name: Deploy via SSH to Webgo
        run: |
          # Create SSH directory and private key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add known host to avoid host key verification prompts
          ssh-keyscan ${{ secrets.WEBGO_SFTP_HOST }} >> ~/.ssh/known_hosts

          # Execute commands on the remote server
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.WEBGO_SFTP_PORT || 22 }} ${{ secrets.WEBGO_SFTP_USERNAME }}@${{ secrets.WEBGO_SFTP_HOST }} "mkdir -p /home/www/de.absolutholz.planningpoker && rm -rf /home/www/de.absolutholz.planningpoker/*"

          # Rsync the dist directory
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.WEBGO_SFTP_PORT || 22 }}" dist/ ${{ secrets.WEBGO_SFTP_USERNAME }}@${{ secrets.WEBGO_SFTP_HOST }}:/home/www/de.absolutholz.planningpoker/

          # Fix permissions on the server
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.WEBGO_SFTP_PORT || 22 }} ${{ secrets.WEBGO_SFTP_USERNAME }}@${{ secrets.WEBGO_SFTP_HOST }} "find /home/www/de.absolutholz.planningpoker -type d -exec chmod 755 {} \; && find /home/www/de.absolutholz.planningpoker -type f -exec chmod 644 {} \;"

          # Clean up the private key (Important for security)
          rm ~/.ssh/id_rsa
